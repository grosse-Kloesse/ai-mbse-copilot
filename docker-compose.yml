services:
  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
    volumes:
      - ./api:/app/api
    environment:
      - QDRANT_URL=http://qdrant:6333
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
volumes:
  qdrant_data:
